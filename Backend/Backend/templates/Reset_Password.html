<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password – My Tailor</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="auth-wrap">
  <div class="card border-0 rounded-4 shadow overflow-hidden" style="max-width:450px; width:100%">
    <div class="auth-left p-4 text-center" style="min-height:auto">
      <div class="auth-left-pattern"></div>
      <div class="position-relative z-1">
        <div class="footer-brand mb-1">My<span>Tailor</span></div>
        <p class="text-white-50 small mb-0">Security Verification Successful</p>
      </div>
    </div>
    <div class="card-body p-4 p-sm-5 bg-white">
      <h4 class="mb-3" style="color:var(--mt-navy)">New Password</h4>
      <p class="text-muted small mb-4">Set a strong password for your account.</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} small py-2">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form action="{{ url_for('reset_password') }}" method="POST" onsubmit="return validatePasswords(event)">
        <div class="mb-3">
          <label class="form-label small fw-500">New Password</label>
          <input type="password" name="password" id="newPass" class="form-control" required minlength="6">
        </div>
        <div class="mb-4">
          <label class="form-label small fw-500">Confirm Password</label>
          <input type="password" name="confirm_password" id="confirmPass" class="form-control" required>
          <div id="matchErr" class="text-danger small mt-1" style="display:none">Passwords do not match.</div>
        </div>

        <button type="submit" class="btn btn-gold w-100 py-2 mb-3">Update Password →</button>
      </form>
    </div>
  </div>
</div>

<script>
function validatePasswords(e) {
  const p1 = document.getElementById('newPass').value;
  const p2 = document.getElementById('confirmPass').value;
  const confirmInput = document.getElementById('confirmPass');
  if (p1 !== p2) {
    e.preventDefault();
    confirmInput.classList.add('is-invalid');
    return false;
  }
  confirmInput.classList.remove('is-invalid');
  return true;
}
</script>
</body>
</html>
